name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "claude/**"]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Lint, type-check, syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: HTML validation
        run: npm run validate:html
      - name: Static deployment assertions
        run: npm run verify:deployment
      - name: Em-dash sweep on user-facing files
        run: |
          if grep -nP '[\x{2014}]' first-hour.html index.html privacy.html | grep -v '^[^:]*:[0-9]*:[[:space:]]*\*\|^[^:]*:[0-9]*:[[:space:]]*//\|^[^:]*:[0-9]*:[[:space:]]*/\*'; then
            echo "Em dash found in user-facing copy"; exit 1
          fi
      - name: Lint
        run: npm run lint --if-present
      - name: Type check
        run: npm run type-check --if-present

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test --if-present

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Chromium browsers
        run: npx playwright install --with-deps chromium
      - name: Playwright desktop and mobile Chromium
        run: npm run test:e2e --if-present -- --project=chromium --project=mobile-chrome

  accessibility:
    name: Accessibility (axe)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium
      - run: npm run test:a11y --if-present

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:lighthouse --if-present

  security:
    name: Security audit
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm audit --audit-level=high || echo "audit complete (warnings allowed)"

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run sbom --if-present || echo "sbom not yet configured"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.cdx.json
          if-no-files-found: ignore
