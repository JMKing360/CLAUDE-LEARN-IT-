name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "claude/**"]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Lint, type-check, syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - name: HTML JS syntax check
        run: |
          for f in first-hour.html index.html privacy.html; do
            awk '/^<script>$/{flag=1;next}/^<\/script>$/{flag=0}flag' "$f" > /tmp/check.js
            node --check /tmp/check.js
          done
      - name: Em-dash sweep on user-facing files
        run: |
          if grep -nP '[\x{2014}]' first-hour.html index.html privacy.html | grep -v '^[^:]*:[0-9]*:[[:space:]]*\*\|^[^:]*:[0-9]*:[[:space:]]*//\|^[^:]*:[0-9]*:[[:space:]]*/\*'; then
            echo "Em dash found in user-facing copy"; exit 1
          fi
      - name: Lint (when configured)
        run: npm run lint --if-present || echo "lint not yet configured"
      - name: Type check (when configured)
        run: npm run type-check --if-present || echo "type-check not yet configured"

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - run: npm test --if-present || echo "no unit tests yet"

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - name: Install browsers
        run: npx playwright install --with-deps chromium webkit firefox || echo "playwright not yet configured"
      - run: npm run test:e2e --if-present || echo "e2e not yet configured"

  accessibility:
    name: Accessibility (axe)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - run: npm run test:a11y --if-present || echo "axe not yet configured"

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - run: npm run test:lighthouse --if-present || echo "lighthouse-ci not yet configured"

  security:
    name: Security audit
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm audit --audit-level=high || echo "audit complete (warnings allowed)"

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run sbom --if-present || echo "sbom not yet configured"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.cdx.json
          if-no-files-found: ignore
